<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MockMCP — Paid tier waitlist</title>
    <style>
      :root {
        --bg: #0a0a0d;
        --surface: #14141a;
        --surface-hi: #1b1b24;
        --border: rgba(255, 255, 255, 0.08);
        --border-hi: rgba(255, 255, 255, 0.16);
        --fg: #ededf0;
        --fg-muted: #8a8a96;
        --accent: #ff8a3d;
        --accent-glow: rgba(255, 138, 61, 0.35);
        --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Inter, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--fg);
        font-family: var(--sans); line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      body {
        background:
          radial-gradient(ellipse at 20% 0%, rgba(255,138,61,0.08), transparent 45%),
          var(--bg);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 48px 24px;
      }
      .card {
        width: 100%; max-width: 460px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px 32px 32px;
      }
      .logo {
        display: inline-flex; align-items: center; gap: 10px;
        font-weight: 800; font-size: 16px; margin-bottom: 28px;
        color: var(--fg); text-decoration: none;
      }
      .logo-mark {
        width: 24px; height: 24px; border-radius: 6px;
        background: linear-gradient(135deg, #ff8a3d 0%, #ff5821 100%);
        color: #1a0a00; font-family: var(--mono); font-size: 11px;
        font-weight: 900; display: grid; place-items: center;
        box-shadow: 0 4px 14px var(--accent-glow);
      }
      h1 {
        font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      p.lede {
        color: var(--fg-muted); margin: 0 0 24px; font-size: 15px;
      }
      form {
        display: flex; gap: 8px;
      }
      input[type=email] {
        flex: 1; height: 44px; padding: 0 14px;
        background: var(--surface-hi); color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px; font-family: var(--sans);
        outline: none;
      }
      input[type=email]:focus { border-color: var(--accent); }
      button {
        height: 44px; padding: 0 18px;
        background: var(--accent); color: #1a0a00;
        border: none; border-radius: 10px;
        font-weight: 700; font-size: 14px; cursor: pointer;
        font-family: var(--sans);
      }
      button:hover { opacity: 0.92; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .note {
        color: var(--fg-muted); font-size: 12px; margin-top: 16px;
      }
      .success {
        margin-top: 16px; padding: 12px 14px;
        background: rgba(72,213,151,0.08);
        border: 1px solid rgba(72,213,151,0.25);
        border-radius: 10px; color: #8bedb9; font-size: 14px;
      }
      .error {
        margin-top: 16px; padding: 12px 14px;
        background: rgba(255,95,95,0.08);
        border: 1px solid rgba(255,95,95,0.25);
        border-radius: 10px; color: #ff8a8a; font-size: 14px;
      }
      .back { display: inline-block; margin-top: 20px; color: var(--fg-muted); font-size: 13px; }
      .back:hover { color: var(--fg); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <a href="/" class="logo"><span class="logo-mark">M</span>MockMCP</a>
      <h1>Paid tier waitlist</h1>
      <p class="lede">
        Free tier is enough for prototyping. If you're running evals in CI or
        hitting rate limits, drop your email. You'll hear first when the paid
        tier launches — higher limits, reliability guarantees, priority support.
      </p>
      <form id="waitlist-form">
        <input type="email" name="email" placeholder="you@yourcompany.com" required autocomplete="email" />
        <button type="submit">Join</button>
      </form>
      <p id="result" class="note" style="display:none"></p>
      <a href="/" class="back">← Back to MockMCP</a>
    </div>

    <script>
      const form = document.getElementById("waitlist-form");
      const result = document.getElementById("result");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = new FormData(form).get("email");
        result.className = "note";
        result.style.display = "none";
        try {
          const res = await fetch("/api/waitlist", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          if (!res.ok) throw new Error((await res.json())?.error || "Failed");
          result.className = "success";
          result.textContent = "You're on the list. We'll be in touch.";
          result.style.display = "block";
          form.reset();
        } catch (err) {
          result.className = "error";
          result.textContent = err.message || "Something went wrong.";
          result.style.display = "block";
        }
      });
    </script>
  </body>
</html>
